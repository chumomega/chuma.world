<footer class="site-footer">
  <div class="wrapper footer-inner">
    <ul class="footer-social">
      {%- if site.linkedin_username -%}
      <li><a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener">LinkedIn</a></li>
      {%- endif -%}
      {%- if site.github_username -%}
      <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a></li>
      {%- endif -%}
      {%- if site.youtube_username -%}
      <li><a href="https://www.youtube.com/{{ site.youtube_username }}" target="_blank" rel="noopener">YouTube</a></li>
      {%- endif -%}
      {%- if site.instagram_username -%}
      <li><a href="https://instagram.com/{{ site.instagram_username }}" target="_blank" rel="noopener">Instagram</a></li>
      {%- endif -%}
    </ul>
    <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }}</p>
  </div>
</footer>
